<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locally</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

    <!-- ÜST NAVBAR -->
    <header class="navbar">
        <div class="logo">
            <span class="logo-main">Local</span><span class="logo-accent">ly</span>
        </div>

        <div class="nav-right">
            <div class="search-box">
                <input type="text" placeholder="Ara...">
            </div>

            <select class="language-select">
                <option>Türkçe</option>
                <option>English</option>
                <option>Arapça</option>
            </select>

            <button class="icon-btn">✉</button>
            <button class="icon-btn">☀</button>

            <button class="admin-btn">Admin Panel</button>
        </div>
    </header>

    <!-- ANA LAYOUT -->
    <div class="container">

        <!-- SOL KATEGORİ PANELİ -->
        <aside class="sidebar">
            <h2>Kategoriler</h2>
            <ul>
                <li>Hayvanlar</li>
                <li>İnsan</li>
                <li>Bitkiler</li>
                <li>Böcekler</li>
                <li>Kader</li>
            </ul>
        </aside>

        <!-- ANA İÇERİK -->
        <main class="content">
            <div class="empty-area">
                <!-- İçerik alanı -->
            </div>
        </main>

    </div>

</body>
</html>
