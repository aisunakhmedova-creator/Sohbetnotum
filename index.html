<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SohbetNotum</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .article-card { cursor: pointer; border-radius: 16px; overflow: hidden; background: var(--card-bg, rgba(255,255,255,0.05)); border: 1px solid rgba(255,255,255,0.08); transition: transform .2s, box-shadow .2s; }
        .article-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,.35); }
        .article-card .card-cover { height: 180px; background: #1e1a35 center/cover no-repeat; }
        .article-card .card-body { padding: 16px 18px 20px; }
        .article-card .art-meta { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; font-size: 12px; color: #a78bfa; }
        .article-card .art-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; line-height: 1.4; }
        .article-card .art-excerpt { font-size: 13px; color: #aaa; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .article-card .art-cta { margin-top: 14px; font-size: 13px; color: #a78bfa; }
        .empty-msg { text-align: center; padding: 80px 20px; color: #555; font-size: 16px; }
        .detail-article { max-width: 720px; margin: 0 auto; padding: 40px 24px; }
        .detail-article h1 { font-size: 28px; margin-bottom: 12px; line-height: 1.35; }
        .detail-article .art-date { color: #a78bfa; font-size: 13px; margin-bottom: 28px; }
        .detail-article .art-body { font-size: 16px; line-height: 1.85; white-space: pre-wrap; color: #ccc; }
        .detail-article .art-cover-img { width: 100%; border-radius: 12px; margin-bottom: 28px; object-fit: cover; max-height: 380px; }
        body.light-mode .article-card { background: #f5f3ff; border-color: #e0d9f7; }
        body.light-mode .article-card .art-excerpt { color: #666; }
        body.light-mode .detail-article .art-body { color: #333; }
        .sidebar li.active-year { color: #a78bfa; font-weight: 600; }
        .sidebar li ul li.active-month { color: #a78bfa; font-weight: 600; }
    </style>
</head>
<body>
    

    <!-- ÜST NAVBAR -->
    <header class="navbar">
        <div class="logo">
            <span class="logo-main">Sohbet</span><span class="logo-accent">Notum</span>
        </div>
        <div class="nav-right">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Ara...">
            </div>
            <select class="language-select" id="languageSelect">
                <option value="tr">Türkçe</option>
                <option value="az">Azerbaycanca</option>
                <option value="en">English</option>
                <option value="ar">Arapça</option>
                <option value="ru">Rusça</option>
                <option value="fr">Fransızca</option>
                <option value="de">Almanca</option>
                <option value="es">İspanyolca</option>
                <option value="it">İtalyanca</option>
                <option value="fa">Farsça</option>
                <option value="zh">Çince</option>
            </select>
            <button class="icon-btn" id="themeToggle" type="button" aria-label="Tema değiştir">☀</button>
            <a class="admin-btn" href="admin-panel.html">Admin Panel</a>
        </div>
    </header>

    <!-- LİSTELEME GÖRÜNÜMÜ -->
    <div id="listingView">
        <div class="container">
            <aside class="sidebar">
                <h2 id="categoryTitle">Kategoriler</h2>
                <ul id="categoryList"></ul>
            </aside>
            <main class="content">
                <div class="listings-area" id="listingsArea"></div>
            </main>
        </div>
    </div>

    <!-- DETAY GÖRÜNÜMÜ -->
    <div id="detailView" class="detail-view hidden">
        <div style="padding: 20px 24px;">
            <button class="back-btn" id="backBtn" style="position:static;margin-bottom:20px;">← Geri dön</button>
        </div>
        <div id="detailArticle"></div>
    </div>

    <script>
        // ── ÇEVİRİLER ─────────────────────────────────────────────────────
        const months = {
            tr: ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"],
            az: ["Yanvar","Fevral","Mart","Aprel","May","İyun","İyul","Avqust","Sentyabr","Oktyabr","Noyabr","Dekabr"],
            en: ["January","February","March","April","May","June","July","August","September","October","November","December"],
            ar: ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"],
            ru: ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"],
            fr: ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"],
            de: ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"],
            es: ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"],
            it: ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"],
            fa: ["ژانویه","فوریه","مارس","آوریل","مه","ژوئن","ژوئیه","اوت","سپتامبر","اکتبر","نوامبر","دسامبر"],
            zh: ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"]
        };

        const trMonths = months.tr; // Makaleler Türkçe ay adıyla kaydediliyor

        const translations = {
            tr: { title: "Kategoriler" }, az: { title: "Kateqoriyalar" }, en: { title: "Categories" },
            ar: { title: "الفئات" }, ru: { title: "Категории" }, fr: { title: "Catégories" },
            de: { title: "Kategorien" }, es: { title: "Categorías" }, it: { title: "Categorie" },
            fa: { title: "دسته‌بندی‌ها" }, zh: { title: "分类" }
        };

        const years = ["2016", "2017", "2018"];

        const languageSelect = document.getElementById("languageSelect");
        const categoryTitle  = document.getElementById("categoryTitle");
        const categoryList   = document.getElementById("categoryList");
        const themeToggle    = document.getElementById("themeToggle");
        const listingView    = document.getElementById("listingView");
        const detailView     = document.getElementById("detailView");
        const backBtn        = document.getElementById("backBtn");
        const listingsArea   = document.getElementById("listingsArea");

        let openYear     = null;
        let filterYear   = null;
        let filterMonth  = null; // Türkçe ay adı

        // ── VERİ ──────────────────────────────────────────────────────────
        function getArticles() { return JSON.parse(localStorage.getItem("sn_articles") || "[]"); }

        // ── KATEGORİ LİSTESİ ─────────────────────────────────────────────
        function renderCategories(lang) {
            const cur = translations[lang] || translations.tr;
            categoryTitle.textContent = cur.title;
            categoryList.innerHTML = "";

            // Tümü
            const allLi = document.createElement("li");
            allLi.textContent = lang === "tr" ? "Tümü" : lang === "en" ? "All" : lang === "ar" ? "الكل" : lang === "ru" ? "Все" : lang === "fr" ? "Tout" : lang === "de" ? "Alle" : lang === "es" ? "Todo" : lang === "it" ? "Tutto" : "Tümü";
            allLi.style.cursor = "pointer";
            if (!filterYear && !filterMonth) allLi.classList.add("active-year");
            allLi.addEventListener("click", () => { filterYear = null; filterMonth = null; openYear = null; renderCategories(lang); renderArticles(); });
            categoryList.appendChild(allLi);

            const langMonths = months[lang] || months.tr;
            years.forEach(year => {
                const li = document.createElement("li");
                li.style.cursor = "pointer";
                li.style.userSelect = "none";
                if (filterYear === year && !filterMonth) li.classList.add("active-year");

                const toggle = document.createElement("span");
                toggle.textContent = (openYear === year ? "▾ " : "▸ ") + year;
                li.appendChild(toggle);

                const subUl = document.createElement("ul");
                subUl.style.paddingLeft = "16px";
                subUl.style.marginTop = "6px";
                subUl.style.display = openYear === year ? "block" : "none";

                langMonths.forEach((month, idx) => {
                    const trMonth = trMonths[idx];
                    const subLi = document.createElement("li");
                    subLi.textContent = month;
                    subLi.style.cursor = "pointer";
                    if (filterYear === year && filterMonth === trMonth) subLi.classList.add("active-month");
                    subLi.addEventListener("click", e => {
                        e.stopPropagation();
                        filterYear = year; filterMonth = trMonth;
                        renderCategories(lang); renderArticles();
                    });
                    subUl.appendChild(subLi);
                });
                li.appendChild(subUl);

                li.addEventListener("click", () => {
                    if (openYear === year) {
                        openYear = null;
                    } else {
                        openYear = year;
                        filterYear = year; filterMonth = null;
                        renderArticles();
                    }
                    renderCategories(lang);
                });

                categoryList.appendChild(li);
            });
        }

        // ── KARTLAR ──────────────────────────────────────────────────────
        function renderArticles(searchQ) {
            let articles = getArticles();

            if (filterYear)  articles = articles.filter(a => a.year === filterYear);
            if (filterMonth) articles = articles.filter(a => a.month === filterMonth);
            if (searchQ)     articles = articles.filter(a => a.title.toLowerCase().includes(searchQ.toLowerCase()) || a.content.toLowerCase().includes(searchQ.toLowerCase()));

            listingsArea.innerHTML = "";

            if (!articles.length) {
                listingsArea.innerHTML = '<div class="empty-msg">Henüz makale yok.</div>';
                return;
            }

            articles.forEach(a => {
                const card = document.createElement("div");
                card.className = "listing-card article-card";
                const excerpt = a.content.slice(0, 160).replace(/\n/g, " ");
                card.innerHTML = `
                    <div class="card-cover" style="background-image:url('${a.cover || ""}');background-color:#1e1a35"></div>
                    <div class="card-body">
                        <div class="art-meta">
                            <span>${a.year}</span><span>·</span><span>${a.month}</span>
                            <span>·</span><span>${a.date}</span>
                        </div>
                        <div class="art-title">${a.title}</div>
                        <div class="art-excerpt">${excerpt}${a.content.length > 160 ? "…" : ""}</div>
                        <div class="art-cta">Devamını Oku →</div>
                    </div>
                `;
                card.addEventListener("click", () => openArticleDetail(a));
                listingsArea.appendChild(card);
            });
        }

        // ── DETAY ────────────────────────────────────────────────────────
        function openArticleDetail(a) {
            listingView.classList.add("hidden");
            detailView.classList.remove("hidden");
            window.scrollTo(0, 0);

            document.getElementById("detailArticle").innerHTML = `
                <div class="detail-article">
                    ${a.cover ? `<img class="art-cover-img" src="${a.cover}" alt="${a.title}">` : ""}
                    <h1>${a.title}</h1>
                    <div class="art-date">${a.year} / ${a.month} &nbsp;·&nbsp; ${a.date}</div>
                    <div class="art-body">${a.content}</div>
                </div>
            `;
        }

        backBtn.addEventListener("click", () => {
            detailView.classList.add("hidden");
            listingView.classList.remove("hidden");
            window.scrollTo(0, 0);
        });

        // ── ARAMA ────────────────────────────────────────────────────────
        document.getElementById("searchInput").addEventListener("input", e => {
            renderArticles(e.target.value.trim());
        });

        // ── TEMA ─────────────────────────────────────────────────────────
        themeToggle.addEventListener("click", () => {
            const light = document.body.classList.toggle("light-mode");
            themeToggle.textContent = light ? "☾" : "☀";
        });

        // ── BAŞLANGIÇ ────────────────────────────────────────────────────
        languageSelect.addEventListener("change", e => renderCategories(e.target.value));
        renderCategories(languageSelect.value);
        renderArticles();
    </script>
</body>
</html>
