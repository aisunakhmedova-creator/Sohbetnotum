            <div class="search-box">

        const detailView  = document.getElementById("detailView");
        const backBtn     = document.getElementById("backBtn");

        backBtn.addEventListener("click", () => {
            detailView.classList.add("hidden");
            listingView.classList.remove("hidden");
            window.scrollTo(0, 0);
        });

        function openDetail(b) {
            listingView.classList.add("hidden");
            detailView.classList.remove("hidden");
            window.scrollTo(0, 0);

            document.getElementById("detailCover").src = b.cover;
            document.getElementById("detailCoverIcon").textContent = b.icon;
            document.getElementById("detailCoverIcon").className = `detail-cover-icon ${b.iconClass}`;
            document.getElementById("detailName").textContent = b.name;
            document.getElementById("detailCategory").textContent = b.category;
            document.getElementById("detailLocation").textContent = b.location;
            document.getElementById("detailTags").innerHTML = b.tags.map(t => `<span class="service-tag">${t}</span>`).join("");
            document.getElementById("detailMapFrame").src = `https://maps.google.com/maps?q=${b.lat},${b.lng}&hl=tr&z=16&output=embed`;

            const main = document.getElementById("detailMain");
            if (b.type === "restaurant") {
                main.innerHTML = `<div class="detail-section-title">Menü</div>` + b.menu.map(sec => `
                    <div class="menu-section-name">${sec.section}</div>
                    <div class="menu-img-grid">
                        ${sec.items.map(item => `
                            <div class="menu-img-card">
                                <img src="${item.img}" alt="${item.name}" loading="lazy">
                                <div class="menu-img-info">
                                    <span class="menu-img-name">${item.name}</span>
                                    <span class="menu-img-price">${item.price}</span>
                                </div>
                            </div>
                        `).join("")}
                    </div>
                `).join("");
            } else if (b.type === "beauty") {
                main.innerHTML = `
                    <div class="detail-section-title">✂️ Saç Hizmetleri</div>
                    <div class="menu-img-grid">
                        ${b.hair.map(s => `
                            <div class="menu-img-card">
                                <img src="${s.img}" alt="${s.name}" loading="lazy">
                                <div class="menu-img-info">
                                    <span class="menu-img-name">${s.name}</span>
                                    <span class="menu-img-price">${s.price}</span>
                                </div>
                            </div>
                        `).join("")}
                    </div>
                    <div class="detail-section-title" style="margin-top:32px">💅 Tırnak Hizmetleri</div>
                    <div class="menu-img-grid">
                        ${b.nails.map(s => `
                            <div class="menu-img-card">
                                <img src="${s.img}" alt="${s.name}" loading="lazy">
                                <div class="menu-img-info">
                                    <span class="menu-img-name">${s.name}</span>
                                    <span class="menu-img-price">${s.price}</span>
                                </div>
                            </div>
                        `).join("")}
                    </div>
                `;
            } else if (b.type === "barber") {
                main.innerHTML = `
                    <div class="detail-section-title">Hizmetler & Fiyatlar</div>
                    <div class="menu-img-grid">
                        ${b.services.map(s => `
                            <div class="menu-img-card">
                                <img src="${s.img}" alt="${s.name}" loading="lazy">
                                <div class="menu-img-info">
                                    <span class="menu-img-name">${s.name}</span>
                                    <span class="menu-img-price">${s.price}</span>
                                </div>
                            </div>
                        `).join("")}
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
